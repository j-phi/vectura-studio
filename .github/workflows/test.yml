name: Tests

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '0 8 * * *'

jobs:
  unit:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm install --no-audit --no-fund --loglevel=error
      - run: npm run test:unit

  integration:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm install --no-audit --no-fund --loglevel=error
      - run: npm run test:integration

  e2e-smoke:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm install --no-audit --no-fund --loglevel=error
      # Smoke projects are desktop + touch-tablet + iPhone-mini emulation on Chromium.
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  visual:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm install --no-audit --no-fund --loglevel=error
      - run: npm run test:visual
      - name: Upload Visual Artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: visual-artifacts
          path: |
            tests/baselines
            *.diff
          if-no-files-found: ignore

  perf:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm install --no-audit --no-fund --loglevel=error
      - run: npm run test:perf

  coverage:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm install --no-audit --no-fund --loglevel=error
      # Runs through scripts/run-vitest.js, which tolerates vitest's birpc
      # "Timeout calling onTaskUpdate" RPC timeout — and ONLY that, and only when
      # zero tests failed. See the header of that script for why nothing else
      # (fork count, console volume, sharding, coverage scope, the threads pool)
      # eliminates it. A real failure still fails the job.
      - run: npm run test:coverage
      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage
          retention-days: 7
          if-no-files-found: ignore
