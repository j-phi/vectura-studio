<!doctype html><html><head><meta charset="utf-8"><style>
  body { margin:0; background:#1a1f26; font:13px ui-monospace,monospace; color:#9fb4c8; padding:16px; }
  .panel { display:inline-block; width:280px; margin:8px; vertical-align:top; }
  .stage { position:relative; width:280px; height:84px; background:#0f1318; border:1px solid #232c36; border-radius:8px; overflow:hidden; }
  .spec { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:rgba(241,241,241,.14); font-size:40px; white-space:pre; }
  svg.ov { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
</style></head><body><div id="root"></div>
<script src="../src/core/algorithms/stroke-font.js"></script>
<script src="../src/ui/ui-text-specimen.js"></script>
<script>
  const V = window.Vectura;
  function panel(label, params) {
    const wrap=document.createElement('div'); wrap.className='panel';
    const cap=document.createElement('div'); cap.textContent=label; cap.style.marginBottom='4px';
    const stage=document.createElement('div'); stage.className='stage';
    const spec=document.createElement('div'); spec.className='spec';
    const g=document.createElementNS('http://www.w3.org/2000/svg','svg'); g.setAttribute('class','ov');
    const f=document.createElementNS('http://www.w3.org/2000/svg','svg'); f.setAttribute('class','ov');
    const o=document.createElementNS('http://www.w3.org/2000/svg','svg'); o.setAttribute('class','ov');
    stage.append(f,spec,o,g); wrap.append(cap,stage); root.append(wrap);
    V.UI.TextSpecimen.create({stage,specText:spec,guideSvg:g,fillSvg:f,outlineSvg:o}).render({params},{guides:'frame'});
  }
  const B={text:'Vectura',fitToFrame:true,fillRatio:0.9,outlineStroke:true,outlineThickness:1,lineHeight:1.4,align:'center'};
  ['sans','italic','condensed','wide','oblique'].forEach(s => panel('Style: '+s, {...B,font:s,fontWeight:'Regular'}));
  ['Regular','Medium','Semibold','Bold'].forEach(w => panel('Weight: '+w, {...B,font:'sans',text:'Bold',fontWeight:w}));
</script></body></html>
